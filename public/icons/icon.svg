<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="outer" x1="80" y1="64" x2="430" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" />
      <stop offset="0.5" stop-color="#22D3EE" />
      <stop offset="1" stop-color="#6366F1" />
    </linearGradient>
    <linearGradient id="glass" x1="150" y1="130" x2="370" y2="390" gradientUnits="userSpaceOnUse">
