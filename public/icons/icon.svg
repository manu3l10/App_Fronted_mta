    <rect x="91" y="91" width="330" height="330" rx="84" fill="#020817" fill-opacity="0.96" />
    <rect x="114" y="114" width="284" height="284" rx="64" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="4" />
  </g>

  <text
    x="256"
