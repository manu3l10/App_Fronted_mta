  </defs>

  <rect width="512" height="512" rx="112" fill="#020817" />
  <circle cx="144" cy="128" r="150" fill="#2563EB" fill-opacity="0.26" />
  <circle cx="382" cy="390" r="178" fill="#06B6D4" fill-opacity="0.18" />

